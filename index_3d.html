<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edhas 3D - Interactive Neural Network</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: #fff; overflow: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        .overlay { position: fixed; z-index: 10; pointer-events: none; }
        .header { top: 0; left: 0; right: 0; padding: 20px 40px; background: linear-gradient(180deg, rgba(10,10,15,0.9) 0%, transparent 100%); pointer-events: auto; }
        .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; }
        .logo-section { display: flex; align-items: center; gap: 15px; }
        .logo-icon { font-size: 2.5rem; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .logo-text h1 { font-size: 2rem; background: linear-gradient(135deg, #4ade80, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
        .logo-text p { color: #888; font-size: 0.9rem; margin: 0; }
        .nav-buttons { display: flex; gap: 15px; }
        .btn { padding: 12px 24px; border-radius: 8px; border: none; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; pointer-events: auto; }
        .btn-primary { background: linear-gradient(135deg, #4ade80, #60a5fa); color: #0a0a0f; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(74, 222, 128, 0.3); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .sidebar { right: 20px; top: 50%; transform: translateY(-50%); pointer-events: auto; }
        .controls-panel { background: rgba(20,20,35,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 25px; width: 300px; }
        .controls-panel h3 { color: #4ade80; margin-bottom: 20px; font-size: 1.1rem; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; color: #aaa; font-size: 0.85rem; margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: linear-gradient(135deg, #4ade80, #60a5fa); border-radius: 50%; cursor: pointer; }
        .value-display { color: #4ade80; font-weight: 600; min-width: 50px; text-align: right; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; text-align: center; }
        .stat-box .value { font-size: 1.5rem; font-weight: bold; color: #4ade80; }
        .stat-box .label { font-size: 0.75rem; color: #888; margin-top: 5px; }
        .legend { position: fixed; bottom: 30px; left: 30px; background: rgba(20,20,35,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; pointer-events: auto; }
        .legend h4 { color: #4ade80; margin-bottom: 15px; font-size: 0.9rem; }
        .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 0.85rem; color: #aaa; }
        .legend-color { width: 20px; height: 20px; border-radius: 4px; }
        .loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0f; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; transition: opacity 0.5s; }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
        .loader { width: 60px; height: 60px; border: 3px solid rgba(74, 222, 128, 0.2); border-top-color: #4ade80; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 20px; color: #4ade80; font-size: 1.1rem; }
        .tooltip { position: fixed; background: rgba(20,20,35,0.95); border: 1px solid rgba(74, 222, 128, 0.3); border-radius: 8px; padding: 10px 15px; font-size: 0.85rem; color: #fff; pointer-events: none; z-index: 100; display: none; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="loading-screen" id="loading"><div class="loader"></div><div class="loading-text">Initializing 3D Neural Network...</div></div>
    <div id="canvas-container"></div>
    <div class="tooltip" id="tooltip"></div>
    
    <header class="overlay header">
        <div class="header-content">
            <div class="logo-section">
                <div class="logo-icon">🌿</div>
                <div class="logo-text">
                    <h1>Edhas 3D</h1>
                    <p>Self-Pruning Neural Network Visualization</p>
                </div>
            </div>
            <div class="nav-buttons">
                <a href="/train" class="btn btn-primary">🚀 Train Model</a>
                <a href="/results" class="btn btn-secondary">📊 Results</a>
            </div>
        </div>
    </header>

    <aside class="overlay sidebar">
        <div class="controls-panel">
            <h3>🎮 Interactive Controls</h3>
            <div class="control-group">
                <label>Lambda (Sparsity)</label>
                <div class="slider-container">
                    <input type="range" id="lambda-slider" min="0" max="100" value="10">
                    <span class="value-display" id="lambda-value">0.010</span>
                </div>
            </div>
            <div class="control-group">
                <label>Gate Threshold</label>
                <div class="slider-container">
                    <input type="range" id="gate-slider" min="0" max="100" value="50">
                    <span class="value-display" id="gate-value">50%</span>
                </div>
            </div>
            <div class="control-group">
                <label>Rotation Speed</label>
                <div class="slider-container">
                    <input type="range" id="speed-slider" min="0" max="100" value="20">
                    <span class="value-display" id="speed-value">20%</span>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-box"><div class="value" id="neuron-count">256</div><div class="label">Neurons</div></div>
                <div class="stat-box"><div class="value" id="sparsity-stat">45%</div><div class="label">Sparsity</div></div>
                <div class="stat-box"><div class="value" id="active-stat">128</div><div class="label">Active</div></div>
                <div class="stat-box"><div class="value" id="pruned-stat">128</div><div class="label">Pruned</div></div>
            </div>
        </div>
    </aside>

    <div class="overlay legend">
        <h4>📚 Legend</h4>
        <div class="legend-item"><div class="legend-color" style="background: #4ade80;"></div><span>Active (Gate ≈ 1)</span></div>
        <div class="legend-item"><div class="legend-color" style="background: #ff6b6b;"></div><span>Pruned (Gate ≈ 0)</span></div>
        <div class="legend-item"><div class="legend-color" style="background: linear-gradient(90deg, #4ade80, #60a5fa);"></div><span>Connection</span></div>
    </div>

    <script>
        let scene, camera, renderer, neurons = [], connections = [], neuronGroups = [], animationId;
        const layers = [12, 24, 24, 10];
        const layerSpacing = 100;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0f);
            scene.fog = new THREE.Fog(0x0a0a0f, 200, 800);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(150, 100, 300);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0x4ade80, 1, 1000);
            pointLight.position.set(200, 200, 200);
            scene.add(pointLight);

            createNetwork();
            createParticles();
            animate();
            setTimeout(() => document.getElementById('loading').classList.add('hidden'), 1500);
        }

        function createNetwork() {
            layers.forEach((count, layerIdx) => {
                const group = [];
                const x = (layerIdx - layers.length / 2) * layerSpacing;
                
                for (let i = 0; i < count; i++) {
                    const y = (i - count / 2) * 30;
                    const geometry = new THREE.SphereGeometry(8, 16, 16);
                    const material = new THREE.MeshPhongMaterial({
                        color: 0x4ade80, emissive: 0x4ade80, emissiveIntensity: 0.3
                    });
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.position.set(x, y, 0);
                    
                    const neuron = { mesh, layer: layerIdx, index: i, gateValue: Math.random() };
                    neurons.push(neuron);
                    group.push(neuron);
                    scene.add(mesh);
                }
                neuronGroups.push(group);
            });

            for (let l = 0; l < layers.length - 1; l++) {
                neuronGroups[l].forEach(n1 => {
                    neuronGroups[l + 1].forEach(n2 => {
                        const strength = Math.random();
                        const geometry = new THREE.BufferGeometry();
                        geometry.setAttribute('position', new THREE.Float32BufferAttribute([
                            n1.mesh.position.x, n1.mesh.position.y, n1.mesh.position.z,
                            n2.mesh.position.x, n2.mesh.position.y, n2.mesh.position.z
                        ], 3));
                        const material = new THREE.LineBasicMaterial({
                            color: 0x4ade80, transparent: true, opacity: strength * 0.4
                        });
                        const line = new THREE.Line(geometry, material);
                        connections.push({ line, from: n1, to: n2, strength });
                        scene.add(line);
                    });
                });
            }
            updateVisualization();
        }

        function createParticles() {
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            for (let i = 0; i < 500; i++) {
                positions.push((Math.random() - 0.5) * 1500, (Math.random() - 0.5) * 1500, (Math.random() - 0.5) * 1500);
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ color: 0x60a5fa, size: 3, transparent: true, opacity: 0.4 });
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            
            const animateParticles = () => {
                particles.rotation.y += 0.0005;
                requestAnimationFrame(animateParticles);
            };
            animateParticles();
        }

        function updateVisualization() {
            const lambda = parseInt(document.getElementById('lambda-slider').value) / 1000;
            const threshold = parseInt(document.getElementById('gate-slider').value) / 100;
            
            let active = 0, pruned = 0;
            
            neurons.forEach(neuron => {
                const effectiveGate = neuron.gateValue * (1 - lambda * 5);
                const isActive = effectiveGate > threshold;
                
                if (isActive) {
                    neuron.mesh.material.color.setHex(0x4ade80);
                    neuron.mesh.material.emissiveIntensity = 0.3 + effectiveGate * 0.5;
                    neuron.mesh.scale.setScalar(1);
                    active++;
                } else {
                    neuron.mesh.material.color.setHex(0xff6b6b);
                    neuron.mesh.material.emissiveIntensity = 0.1;
                    neuron.mesh.scale.setScalar(0.6);
                    pruned++;
                }
            });

            connections.forEach(conn => {
                const fromActive = conn.from.mesh.material.color.getHex() === 0x4ade80;
                const toActive = conn.to.mesh.material.color.getHex() === 0x4ade80;
                conn.line.material.opacity = (fromActive && toActive) ? conn.strength * 0.4 : 0.02;
            });

            document.getElementById('neuron-count').textContent = neurons.length;
            document.getElementById('sparsity-stat').textContent = ((pruned / neurons.length) * 100).toFixed(0) + '%';
            document.getElementById('active-stat').textContent = active;
            document.getElementById('pruned-stat').textContent = pruned;
        }

        function animate() {
            animationId = requestAnimationFrame(animate);
            const speed = parseInt(document.getElementById('speed-slider').value) / 100;
            if (speed > 0) scene.rotation.y += 0.002 * speed;
            
            const time = Date.now() * 0.001;
            neurons.forEach((neuron, i) => {
                if (neuron.mesh.material.color.getHex() === 0x4ade80) {
                    neuron.mesh.scale.setScalar(1 + Math.sin(time * 2 + i * 0.1) * 0.1);
                }
            });
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('lambda-slider').addEventListener('input', (e) => {
            document.getElementById('lambda-value').textContent = (e.target.value / 1000).toFixed(3);
            updateVisualization();
        });

        document.getElementById('gate-slider').addEventListener('input', (e) => {
            document.getElementById('gate-value').textContent = e.target.value + '%';
            updateVisualization();
        });

        document.getElementById('speed-slider').addEventListener('input', (e) => {
            document.getElementById('speed-value').textContent = e.target.value + '%';
        });

        // Mouse interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');

        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(neurons.map(n => n.mesh));
            if (intersects.length > 0) {
                const neuron = neurons.find(n => n.mesh === intersects[0].object);
                tooltip.style.display = 'block';
                tooltip.style.left = e.clientX + 15 + 'px';
                tooltip.style.top = e.clientY + 15 + 'px';
                tooltip.innerHTML = `<strong>Neuron L${neuron.layer}#${neuron.index}</strong><br>Gate: ${neuron.gateValue.toFixed(3)}`;
            } else {
                tooltip.style.display = 'none';
            }
        });

        init();
    </script>
</body>
</html>
